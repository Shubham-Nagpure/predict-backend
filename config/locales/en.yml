# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  model:
    create:
      success: "%{model_name} Created Successfully"
      failure: "Failed to create %{model_name}"
    update:
      success: "%{model_name} Updated Successfully"
      failure: "Failed to update %{model_name}"
    delete:
      success: "%{model_name} Deleted Successfully"
      failure: "Failed to delete %{model_name}"
    found:
      success: "%{model_name} Retrieved Successfully"
      failure: "%{model_name} not found"
  session:
    user:
      success: "User logged in successfully"
      errors:
        not_found: "User account does not exist"
        invalid_password: "Password is invalid"
        deactivated_account: 'User account is currently deactivated'
      forgot_password:
        success: "A password reset link has been sent to your email address. Please check your inbox (and spam folder) to reset your password"
        failure: "Fail to serve request for forgot password"
      reset_password_token:
        expired: "Token is expired or invalid. Try generating a new token."
        failure: "Failed to reset password."
        success: "Password reset successfully."
      logout:
        success: 'Logged out successfully'
  exception:
    unauthorized: "You are not authorized to perform this action"
    record_not_found: "Your session has expired. Please login again."
    token_not_found: "The token is invalid"
    token_expired: 'Your session has expired. Please login again.'
